<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bharath Kumar — Data Engineer & Analytics</title>
  <meta name="description" content="Bharath Kumar — Data Engineer, Analytics & Visualization. Building and validating reliable data pipelines.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0e17'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%2338bdf8'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="wrap">
      <a href="#top" class="brand" id="brand">BK</a>
      <ul class="nav-links" id="navLinks"></ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"></button>
    </div>
  </nav>

  <header class="hero" id="top"></header>

  <main>
    <section class="section" id="about"></section>
    <section class="section" id="skills"></section>
    <section class="section" id="pipeline"></section>
    <section class="section" id="work"></section>
    <section class="section" id="experience"></section>
    <section class="section" id="secret"></section>
    <section class="section" id="play"></section>
    <section class="section contact" id="contact"></section>
  </main>

  <footer class="footer">
    <div class="wrap"><p id="footerText"></p></div>
  </footer>

  <!-- Mood palette switcher (floating, bottom-left) -->
  <div class="mood" id="mood">
    <div class="mood-panel" id="moodPanel"></div>
    <button class="mood-btn" id="moodBtn" aria-label="Change color mood"></button>
  </div>

  <!-- Peek-a-boo astronaut + glowing moon (attached to the right wall) -->
  <div class="astro-dock" aria-hidden="true">
    <div class="moon"></div>
    <div class="astro">
      <svg class="astro-svg" viewBox="0 0 110 150" xmlns="http://www.w3.org/2000/svg">
        <!-- backpack -->
        <rect x="33" y="58" width="44" height="42" rx="13" fill="#c3cdda"/>
        <!-- legs -->
        <rect x="44" y="98" width="10" height="26" rx="5" fill="#e7edf5"/>
        <rect x="56" y="98" width="10" height="26" rx="5" fill="#e7edf5"/>
        <!-- boots -->
        <rect x="41" y="117" width="16" height="12" rx="5" fill="#c3cdda"/>
        <rect x="53" y="117" width="16" height="12" rx="5" fill="#c3cdda"/>
        <!-- right arm (static) -->
        <rect x="69" y="66" width="12" height="30" rx="6" fill="#eef2f7"/>
        <circle cx="75" cy="98" r="7" fill="#f6f9fc"/>
        <!-- body -->
        <rect x="37" y="60" width="36" height="46" rx="16" fill="#f6f9fc"/>
        <!-- chest badge -->
        <circle cx="55" cy="82" r="6" fill="var(--accent)"/>
        <circle cx="55" cy="82" r="2.4" fill="#0a0e17"/>
        <!-- waving arm (animated) -->
        <g class="astro-arm">
          <rect x="26" y="46" width="12" height="34" rx="6" fill="#eef2f7"/>
          <circle cx="32" cy="44" r="8" fill="#f6f9fc"/>
        </g>
        <!-- helmet -->
        <circle cx="55" cy="40" r="30" fill="#f9fbfe"/>
        <circle cx="55" cy="41" r="22.5" fill="#141b2b"/>
        <!-- visor reflections -->
        <ellipse cx="47" cy="33" rx="9" ry="6" fill="var(--accent)" opacity="0.55" transform="rotate(-20 47 33)"/>
        <circle cx="63" cy="47" r="4" fill="var(--accent-2)" opacity="0.6"/>
      </svg>
    </div>
  </div>

  <!-- your content, then the code that renders it -->
  <script src="./data.js"></script>
  <script src="./script.js"></script>
</body>
</html>
